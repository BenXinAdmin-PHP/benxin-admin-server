# +----------------------------------------------------------------------
# | @project   BenXinAdmin
# | @mission   Casbin Model — RBAC with domains（domain = tenant_id，ADR-1）
# | @author    仗键天涯(daxing)
# | @date      2026-06-09 10:00:00
# +----------------------------------------------------------------------
# 请求/策略四元组：sub(角色code) dom(租户) obj(perms串) act(动作)
# 保留 g（角色继承）维度供未来启用；本步不灌 g 策略，DefaultRoleManager
# 对 sub==p.sub 自反命中，故无 g 策略时仍可直配角色权限。

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && keyMatch(r.obj, p.obj) && (r.act == p.act || p.act == "*")
